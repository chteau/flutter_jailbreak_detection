name: CI

on:
  push:
    branches: [master]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: example
      - run: flutter build apk --debug
        working-directory: example

  build-ios-cocoapods:
    name: Build iOS (CocoaPods)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --no-enable-swift-package-manager
      - run: flutter pub get
        working-directory: example
      - run: flutter build ios --no-codesign --debug
        working-directory: example

  build-ios-spm:
    name: Build iOS (SPM)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-swift-package-manager
      - run: flutter pub get
        working-directory: example
      - run: flutter build ios --no-codesign --debug
        working-directory: example
